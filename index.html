<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f9f3ec;
    font-family: 'Georgia', serif;
    color: #3d2b1a;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 44px;
    border-bottom: 1px solid #e8d5c0;
    background: #f9f3ec;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-left, .nav-right { display: flex; gap: 28px; }
  nav a {
    font-size: 13px; letter-spacing: 3px;
    color: #9a7a5a; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: color 0.2s;
  }
  nav a:hover { color: #3d2b1a; }

  /* ── HERO ── */
  .hero { text-align: center; padding: 26px 20px 18px; }
  .hero-inner {
    display: inline-flex;
    flex-direction: column;
    align-items: stretch;
  }
  .hero h1 {
    font-size: 42px; color: #3d2b1a;
    letter-spacing: 6px; font-weight: normal;
    white-space: nowrap;
  }
  .hero-rule {
    display: flex; align-items: center;
    gap: 10px; margin-top: 10px;
  }
  .hero-rule .line   { flex: 1; height: 1px; background: #c4a882; }
  .hero-rule .diamond {
    width: 5px; height: 5px; background: #c4a882;
    transform: rotate(45deg); flex-shrink: 0;
  }

  /* ── CAROUSEL ── */
  .carousel-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 22px 20px 28px;
    min-height: calc(100vh - 140px);
  }
  .carousel-arrow {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #c4a882; border-radius: 50%;
    color: #9a7a5a; font-size: 16px;
    cursor: pointer; background: transparent;
    transition: all 0.2s; -webkit-user-select: none; user-select: none;
    align-self: center;
  }
  .carousel-arrow:hover { background: #c4a882; color: #fff; }

  .carousel-track {
    display: flex; gap: 16px;
    align-items: flex-start;
    justify-content: center;
    flex: 1;
    overflow: hidden;
  }
  .gallery-card {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  .gallery-card.fading { opacity: 0; }
  .gallery-card .img-frame {
    border: 8px solid #e8d5c0;
    box-shadow: 3px 3px 16px rgba(61,43,26,0.13);
    overflow: hidden;
    transition: box-shadow 0.22s, transform 0.22s;
  }
  .gallery-card:hover .img-frame {
    box-shadow: 0 10px 32px rgba(61,43,26,0.22);
    transform: translateY(-3px);
  }
  .gallery-card .img-frame img {
    width: 100%; height: 360px;
    object-fit: contain; display: block;
    background: #f9f3ec;
    transition: transform 0.35s;
    pointer-events: none;
  }
  .gallery-card:hover .img-frame img { transform: scale(1.04); }
  .gallery-card .painting-name {
    text-align: center;
    font-size: 15px; font-style: italic;
    color: #9a7a5a; letter-spacing: 1px;
    padding-top: 11px;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    text-align: center; padding: 0 0 28px;
    font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: #c4a882;
    animation: nudge 2.2s ease-in-out infinite;
  }
  @keyframes nudge {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50%       { transform: translateY(5px); opacity: 1; }
  }

  /* ── DIVIDER ── */
  .section-divider {
    display: flex; align-items: center;
    gap: 18px; padding: 0 44px 36px;
  }
  .section-divider .line  { flex: 1; height: 1px; background: #e8d5c0; }
  .section-divider .label {
    font-size: 9px; letter-spacing: 4px;
    text-transform: uppercase; color: #c4a882; white-space: nowrap;
  }

  /* ── FOLDERS ── */
  .folders-section {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    gap: 24px; padding: 0 44px 60px;
  }
  .folder-card { width: 220px; display: flex; flex-direction: column; cursor: pointer; }
  .folder-card .f-label {
    font-size: 9px; letter-spacing: 4px;
    text-transform: uppercase; color: #7a5c3a;
    padding-bottom: 8px; text-align: center;
  }
  .folder-card .f-img-wrap {
    border: 7px solid #e8d5c0;
    box-shadow: 3px 3px 12px rgba(61,43,26,0.1);
    overflow: hidden;
    transition: box-shadow 0.22s, transform 0.22s;
  }
  .folder-card:hover .f-img-wrap {
    box-shadow: 0 8px 28px rgba(61,43,26,0.2);
    transform: translateY(-2px);
  }
  .folder-card .f-img-wrap img {
    width: 100%; height: 180px;
    object-fit: contain; display: block;
    background: #f9f3ec;
    transition: transform 0.35s;
  }
  .folder-card .f-img-wrap .f-placeholder {
    width: 100%; height: 180px;
    background: #efe4d8;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .folder-card:hover .f-img-wrap img { transform: scale(1.04); }
  .folder-card .f-count {
    font-size: 9px; color: #b08060; letter-spacing: 2px;
    text-transform: uppercase; text-align: center; padding-top: 8px;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(20,11,4,0.93); z-index: 999;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lb-close {
    position: absolute; top: 18px; right: 24px;
    color: #c4a882; font-size: 28px;
    cursor: pointer; transition: color 0.2s; z-index: 2;
    padding: 8px;
  }
  .lb-close:hover { color: #fff; }
  .lb-folder-name {
    position: absolute; top: 24px; left: 0; right: 0;
    text-align: center; font-size: 10px;
    letter-spacing: 4px; text-transform: uppercase; color: #9a7a5a;
  }
  .lb-stage { display: flex; align-items: center; justify-content: center; padding: 0 20px; }
  .lb-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #5a4030; border-radius: 50%;
    color: #9a7a5a; font-size: 18px; cursor: pointer;
    background: rgba(20,11,4,0.6);
    transition: all 0.2s; -webkit-user-select: none; user-select: none;
  }
  #lb-prev { left: 24px; }
  #lb-next { right: 24px; }
  .lb-arrow:hover { border-color: #c4a882; color: #c4a882; }
  .lb-img-wrap {
    border: 10px solid #2e1e10;
    box-shadow: 0 8px 60px rgba(0,0,0,0.7);
    touch-action: pan-y;
    display: flex; align-items: center; justify-content: center;
    background: #1a0d06;
  }
  .lb-img-wrap img {
    max-width: 80vw; max-height: 70vh;
    width: auto; height: auto;
    object-fit: contain; display: block;
    transition: opacity 0.28s ease;
    pointer-events: none;
  }
  .lb-img-wrap img.fading { opacity: 0; }
  .lb-info { text-align: center; margin-top: 14px; }
  .lb-title { font-size: 15px; color: #e8d5c0; letter-spacing: 1px; font-style: italic; }
  .lb-meta  { font-size: 9px; color: #9a7a5a; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
  .lb-dots  { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
  .lb-dot   { width: 8px; height: 8px; border-radius: 50%; background: #3a2518; cursor: pointer; transition: background 0.2s; }
  .lb-dot.active { background: #c4a882; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    nav { padding: 12px 20px; }
    nav a { font-size: 10px; letter-spacing: 2px; }
    .nav-left, .nav-right { gap: 16px; }

    .hero { padding: 18px 16px 14px; }
    .hero h1 { font-size: 26px; letter-spacing: 3px; white-space: normal; }

    .carousel-section { padding: 16px 8px 20px; gap: 8px; min-height: calc(100vh - 120px); }
    .carousel-arrow { width: 34px; height: 34px; font-size: 14px; }
    .gallery-card .img-frame img { height: 240px; }
    .gallery-card .painting-name { font-size: 13px; }
    .gallery-card .img-frame { border-width: 5px; }

    .section-divider { padding: 0 20px 24px; }
    .folders-section { gap: 16px; padding: 0 16px 40px; }
    .folder-card { width: calc(50% - 8px); }
    .folder-card .f-img-wrap img,
    .folder-card .f-img-wrap .f-placeholder { height: 130px; }

    .lb-stage { gap: 10px; padding: 0 8px; }
    .lb-arrow { width: 36px; height: 36px; font-size: 15px; }
    .lb-img-wrap { border-width: 5px; }
    .lb-img-wrap img { max-width: 90vw; max-height: 60vh; }
    .lb-title { font-size: 13px; }
  }

  /* ── TABLET ── */
  @media (min-width: 601px) and (max-width: 900px) {
    nav { padding: 14px 28px; }
    .carousel-section { padding: 18px 16px 24px; }
    .gallery-card .img-frame img { height: 300px; }
    .folders-section { padding: 0 28px 50px; }
  }
</style>
</head>

];

const folders = [
  { label: 'Collection 1', paintings: allPaintings.filter(p => p.folder === 'Collection 1') },
  { label: 'Collection 2', paintings: allPaintings.filter(p => p.folder === 'Collection 2') },
  { label: 'Sculptures',   paintings: allPaintings.filter(p => p.folder === 'Sculptures') },
  { label: 'Sketches',     paintings: allPaintings.filter(p => p.folder === 'Sketches') },
];

function mod(n, m) { return ((n % m) + m) % m; }
function getVisible() {
  if (window.innerWidth <= 600) return 1;
  if (window.innerWidth <= 900) return 2;
  return 4;
}

let carouselStart = 0;

function buildCarousel() {
  const visible = getVisible();
  const track   = document.getElementById('carousel-track');
  track.innerHTML = '';
  for (let i = 0; i < visible; i++) {
    const idx  = mod(carouselStart + i, allPaintings.length);
    const p    = allPaintings[idx];
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.innerHTML = `
      <div class="img-frame"><img src="${p.src}" alt="${p.title}"></div>
      <div class="painting-name">${p.title}</div>
    `;
    card.onclick = () => openLightbox(null, idx, allPaintings);
    track.appendChild(card);
  }
}

function carouselShift(delta) {
  document.querySelectorAll('.gallery-card').forEach(c => c.classList.add('fading'));
  setTimeout(() => {
    carouselStart = mod(carouselStart + delta, allPaintings.length);
    buildCarousel();
  }, 300);
}

document.getElementById('c-prev').onclick = () => carouselShift(-1);
document.getElementById('c-next').onclick = () => carouselShift(1);
window.addEventListener('resize', buildCarousel);

/* Swipe support for carousel */
let touchStartX = 0;
document.getElementById('carousel-track').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('carousel-track').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) carouselShift(dx < 0 ? 1 : -1);
}, { passive: true });

/* Folders */
const foldersEl = document.getElementById('folders-section');
folders.forEach(folder => {
  const cover = folder.paintings[0]?.src || null;
  const card  = document.createElement('div');
  card.className = 'folder-card';
  card.innerHTML = `
    <div class="f-label">${folder.label}</div>
    <div class="f-img-wrap">
      ${cover
        ? `<img src="${cover}" alt="${folder.label}">`
        : `<div class="f-placeholder">🎨</div>`}
    </div>
    <div class="f-count">${folder.paintings.length} work${folder.paintings.length !== 1 ? 's' : ''}</div>
  `;
  if (folder.paintings.length) card.onclick = () => openLightbox(folder.label, 0, folder.paintings);
  foldersEl.appendChild(card);
});

/* Lightbox */
let lbPaintings = [], lbIdx = 0;

function openLightbox(folderName, idx, paintings) {
  lbPaintings = paintings; lbIdx = idx;
  document.getElementById('lb-folder-name').textContent = folderName || '';
  document.getElementById('lightbox').classList.add('open');
  renderLb(false);
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function renderLb(animate) {
  const p   = lbPaintings[lbIdx];
  const img = document.getElementById('lb-img');
  if (animate) {
    img.classList.add('fading');
    setTimeout(() => { img.src = p.src; img.classList.remove('fading'); }, 280);
  } else { img.src = p.src; }
  document.getElementById('lb-title').textContent = p.title;
  document.getElementById('lb-meta').textContent  = p.meta;
  const dotsEl = document.getElementById('lb-dots');
  dotsEl.innerHTML = '';
  if (lbPaintings.length > 1) {
    lbPaintings.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'lb-dot' + (i === lbIdx ? ' active' : '');
      d.onclick = () => { lbIdx = i; renderLb(true); };
      dotsEl.appendChild(d);
    });
  }
}
function lbPrev() { lbIdx = mod(lbIdx - 1, lbPaintings.length); renderLb(true); }
function lbNext() { lbIdx = mod(lbIdx + 1, lbPaintings.length); renderLb(true); }

document.getElementById('lb-prev').onclick  = lbPrev;
document.getElementById('lb-next').onclick  = lbNext;
document.getElementById('lb-close').onclick = closeLightbox;
document.getElementById('lightbox').onclick = e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); };

/* Swipe in lightbox */
let lbTouchX = 0;
document.getElementById('lb-img-wrap').addEventListener('touchstart', e => { lbTouchX = e.touches[0].clientX; }, { passive: true });
document.getElementById('lb-img-wrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 40) { dx < 0 ? lbNext() : lbPrev(); }
}, { passive: true });

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  lbPrev();
  if (e.key === 'ArrowRight') lbNext();
});

buildCarousel();
</script>
